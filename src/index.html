<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Framework33 | CSS and ECMA Script Framework</title>
</head>
<body>

    <section class="hero bg-ruby text-white text-middle p-s-2">

        <h1 class="biggest" anim-on-enter="blur-in" anim-duration="2s" anim-easing="ease-out">Framework33</h1>
        <h4 class="text-light" anim-on-enter="move-down" anim-delay="2s" anim-duration="500ms" anim-easing="ease-out">A Simple CSS and ECMA Script Framework</h4>

    </section>

    <section class="p-5 p-m-3 p-s-2 bg-light-grey">

        <div class="row">
            <div class="block-20 block-m-50 block-s-100 margin align-top text-right pr-2">
                <div class="border p-1 clickable" app-click="panel = ''" app-foreach="item in menu_items" app-bind="item">

                </div>
            </div>
            <div class="block-80 block-s-100 margin align-top text-left">
                <div app-show="!panel">
                    <h2>Welcome</h2>
                </div>
                <div app-show="panel == 'colors'">
                    <h2>Colors</h2>
                </div>
                <div app-show="panel == 'grid'">
                    <h2>Grid</h2>
                </div>
                <div app-show="panel == 'forms'">
                    <h2>Forms</h2>
                </div>
            </div>
        </div>

    </section>

</body>
</html>
