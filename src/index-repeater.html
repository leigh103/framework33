<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Framework33 | CSS and ECMA Script Framework</title>
    <script src="https://kit.fontawesome.com/e7faa1906b.js" crossorigin="anonymous"></script>
    <style>
        .active {
            -webkit-box-shadow: inset 0px -2px 0px 0px #f2f2f2;
            -moz-box-shadow: inset 0px -2px 0px 0px #f2f2f2;
            box-shadow: inset 0px -2px 0px 0px #f2f2f2;
        }
    </style>

</head>
<body>


    <section class="py-4 bg-33-light-grey text-left">

    <div class="contain">
        <div>
        <div class="form-wrap grid col-12 mt-2" app-for="appointment in appointments">

            <div class="colspan-3">

                <label>Start Time</label>
                <div class="">
                    <select app-model="appointment.start_time">
                        <option app-for-sub="hr in getHrs()" app-bind="hr" app-value="hr"></option>
                    </select>
                </div>

            </div>

            <div class="colspan-9">

                <label>Service</label>
                <select app-model="appointment.service">
                    <option selected disabled value="">Choose Service</option>
                    <option app-for-sub="service in services" app-value="service.name" app-bind="service.name"></option>
                </select>

            </div>

            <div class="colspan-3">

                <label>Duration</label>
                <div class="">
                    <select app-model="appointment.duration">
                        <option app-for-sub="hrs in getDurationHrs()" app-bind="hrs"></option>
                    </select>
                </div>

            </div>

            <div class="colspan-9">

                <label>Staff</label>
                <select app-model="appointment.staff_id">
                    <option selected disabled value="">Choose Staff</option>
                    <option app-for-sub="member in staff" app-value="member._key" app-bind="member.name.first"></option>
                </select>

            </div>
        </div>
    </div>
        <a class="btn mt-3" app-click="newAppointment()">
            Add
        </a>
        <a class="btn mt-3" app-click="removeAppointment()">
            Remove
        </a>

    </div>


    </section>



</body>

    <script src="/public/script_repeat.js"></script>
</html>
